    // Engineering design signals
    const sigRows = d.engineering_signals.map(g => {
      const pColor = g.priority==='P1'?'var(--red)':g.priority==='P2'?'var(--amber)':'var(--g4)';
      return `
        <div style="border:1px solid var(--g2);border-left:3px solid ${CONFLICT_COLORS[g.conflict_id]};padding:14px 18px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            <span style="background:${pColor};color:#fff;font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px">${g.priority}</span>
            <strong style="font-family:var(--cond);color:${CONFLICT_COLORS[g.conflict_id]}">${g.conflict_id}</strong>
            <span style="font-size:13px;font-weight:600">${g.systems}</span>
            <span style="font-size:12px;color:var(--g4)">${g.label}</span>
            <span style="margin-left:auto;font-size:12px;color:var(--g5);font-family:var(--cond);font-weight:700">${g.recurrence_pct}% of findings</span>
          </div>
          <div style="font-size:12px;color:var(--g5);line-height:1.6;margin-bottom:6px"><strong style="color:var(--red)">Root cause:</strong> ${g.root_cause}</div>
          <div style="font-size:12px;color:var(--g5);line-height:1.6;margin-bottom:8px"><strong style="color:var(--green)">Recommended fix:</strong> ${g.recommendation}</div>
          <div style="font-size:11px;color:var(--g4)">Linked Jira: <span class="tag">${g.linked_jira}</span></div>
        </div>`;
    }).join('');

    const sigPanel = `
      <div style="border:1px solid var(--g2);border-top:3px solid var(--amber);padding:18px 20px;margin-bottom:16px">
        <div style="font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g5);margin-bottom:4px">Engineering Design Signals</div>
        <div style="font-size:12px;color:var(--g4);margin-bottom:16px">Recurring conflicts ranked by volume, each mapped to its architectural root cause and recommended permanent fix.</div>
        ${sigRows}
      </div>`;

    // Financial exposure trend — grouped bars
    const maxF = Math.max(...d.financial_trend.map(f => f.exposure_usd));
    const finBars = d.financial_trend.map(f => {
      const eH = Math.round(f.exposure_usd / maxF * 100);
      const rH = Math.round(f.recovered_usd / maxF * 100);
      return `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:100%;height:120px;display:flex;align-items:flex-end;justify-content:center;gap:3px">
            <div style="width:40%;height:${eH}%;background:var(--g3);border-radius:3px 3px 0 0" title="Exposure $${f.exposure_usd.toLocaleString()}"></div>
            <div style="width:40%;height:${rH}%;background:var(--green);border-radius:3px 3px 0 0" title="Recovered $${f.recovered_usd.toLocaleString()}"></div>
          </div>
          <div style="font-size:11px;color:var(--g4);font-family:var(--cond);font-weight:600">${f.label}</div>
        </div>`;
    }).join('');

    const finChart = `
      <div style="border:1px solid var(--g2);border-top:3px solid var(--green);padding:18px 20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g5)">Financial Exposure vs Recovery</div>
          <div style="font-size:11px;color:var(--g4)"><span style="color:var(--g3)">■</span> Exposure &nbsp; <span style="color:var(--green)">■</span> Recovered</div>
        </div>
        <div style="display:flex;align-items:flex-end;gap:12px">${finBars}</div>
      </div>`;

    el.innerHTML = kpis + trendChart
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start"><div>${distChart}</div><div>${finChart}</div></div>`
      + sigPanel;
  } catch(e) {
    el.innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
renderLogin();
</script>
</body>
</html>
